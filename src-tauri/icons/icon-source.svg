<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NamAsta Diagnostics">
  <defs>
    <!-- soft blue→teal tile -->
    <linearGradient id="tile" x1="120" y1="90" x2="900" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eaf4ff"/>
      <stop offset="1" stop-color="#d6f3ee"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.26" cy="0.08" r="0.95">
      <stop stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#tile)"/>
  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#gloss)"/>
  <rect x="49.5" y="49.5" width="925" height="925" rx="206.5" fill="none" stroke="#1f4eb6" stroke-opacity="0.10" stroke-width="3"/>

  <!-- artwork authored in a 120-unit space, centred in the tile -->
  <g transform="translate(57,57) scale(7.58)" stroke-linecap="round" stroke-linejoin="round">
    <!-- ATOM ORBITALS (behind) -->
    <g fill="none" stroke-width="2.4">
      <ellipse cx="60" cy="60" rx="50" ry="18.5" transform="rotate(22 60 60)" stroke="#29b6b0"/>
      <ellipse cx="60" cy="60" rx="50" ry="18.5" transform="rotate(82 60 60)" stroke="#1f4eb6"/>
      <ellipse cx="60" cy="60" rx="50" ry="18.5" transform="rotate(142 60 60)" stroke="#29b6b0"/>
    </g>
    <!-- electron dots -->
    <circle cx="14" cy="48" r="2.8" fill="#1f4eb6"/>
    <circle cx="104" cy="74" r="2.8" fill="#29b6b0"/>
    <circle cx="44" cy="108" r="2.8" fill="#1f4eb6"/>
    <circle cx="92" cy="20" r="2.4" fill="#29b6b0"/>

    <!-- HEXAGON frame: 6 rounded segments, alternating blue / teal -->
    <g fill="none" stroke-width="5">
      <path d="M 60,4 L 108,32"  stroke="#1f4eb6"/>
      <path d="M 108,32 L 108,88" stroke="#29b6b0"/>
      <path d="M 108,88 L 60,116" stroke="#1f4eb6"/>
      <path d="M 60,116 L 12,88"  stroke="#29b6b0"/>
      <path d="M 12,88 L 12,32"   stroke="#1f4eb6"/>
      <path d="M 12,32 L 60,4"    stroke="#29b6b0"/>
    </g>

    <!-- MICROSCOPE (centre), tilted ~22°, two-tone (blue outline + teal fill) -->
    <g transform="rotate(-22 60 60)">
      <!-- big C-curve: the arm + base, the microscope's signature sweep -->
      <path d="M 64,38 C 92,50 92,84 60,93 C 47,96 39,92 35,86" fill="none" stroke="#1f4eb6" stroke-width="7"/>
      <!-- focus knob on the arm -->
      <circle cx="86" cy="64" r="5.4" fill="#29b6b0" stroke="#1f4eb6" stroke-width="3"/>
      <!-- body tube (bold diagonal) reaching down to the objective -->
      <rect x="45.5" y="32" width="19" height="44" rx="9.5" fill="#bfeee9" stroke="#1f4eb6" stroke-width="4.4"/>
      <!-- eyepiece cap on top -->
      <rect x="43" y="21" width="18" height="14" rx="7" fill="#7fd8d2" stroke="#1f4eb6" stroke-width="4.4"/>
      <!-- stage platform under the objective -->
      <rect x="32" y="80" width="40" height="7" rx="3.5" fill="#1f4eb6"/>
      <!-- specimen drop on the stage -->
      <circle cx="52" cy="83.5" r="4.2" fill="#29b6b0"/>
    </g>
  </g>
</svg>
