<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NamAsta Diagnostics">
  <defs>
    <!-- maroon body gradient (1024 space) -->
    <linearGradient id="bg" x1="150" y1="90" x2="900" y2="950" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9a1a36"/>
      <stop offset="0.5" stop-color="#6a0f22"/>
      <stop offset="1" stop-color="#3c0813"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.26" cy="0.1" r="0.9">
      <stop stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- blood-drop gradient, authored in the 48-unit art space inside the scaled group -->
    <linearGradient id="drop" x1="24" y1="19" x2="24" y2="29" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6b70"/>
      <stop offset="1" stop-color="#d61f2b"/>
    </linearGradient>
  </defs>

  <!-- Fuller rounded-square body (~91% of the tile) so the mark stays crisp and legible at
       small Windows taskbar sizes; still soft-cornered like a modern app icon. -->
  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#gloss)"/>
  <rect x="49.5" y="49.5" width="925" height="925" rx="206.5" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>

  <!-- Microscope + blood specimen, scaled from 48-unit art and centred in the body.
       Bold white silhouette so it reads at 16-32 px; a red blood drop on the stage gives
       it the pathology "pop". -->
  <g transform="translate(150,138) scale(15.1)">
    <g stroke="#ffffff" stroke-width="3.05" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- eyepiece tube (angled, top) -->
      <line x1="30.2" y1="8.6" x2="24.6" y2="16.4"/>
      <!-- arm: sweeping curve from the head down to the base -->
      <path d="M 24.6,16.4 Q 34.4,20.5 31.2,31.5"/>
      <!-- objective barrel down toward the stage -->
      <line x1="24.6" y1="16.4" x2="21.6" y2="23.2"/>
      <!-- stage (specimen platform) -->
      <line x1="13.4" y1="28.2" x2="29.6" y2="28.2"/>
      <!-- pillar from the stage to the base -->
      <line x1="22.4" y1="28.2" x2="22.4" y2="33.4"/>
      <!-- curved foot / base -->
      <path d="M 13,38 Q 23,33.2 33,38"/>
    </g>
    <!-- eyepiece lens cap (solid) -->
    <circle cx="31.4" cy="7.4" r="3.05" fill="#ffffff"/>
    <!-- blood specimen drop sitting on the stage, just under the objective -->
    <path d="M 20.4,19.4 C 22.3,22.2 23.6,23.8 23.6,25.2 C 23.6,27 22.2,28.1 20.4,28.1 C 18.6,28.1 17.2,27 17.2,25.2 C 17.2,23.8 18.5,22.2 20.4,19.4 Z" fill="url(#drop)"/>
    <ellipse cx="19.4" cy="24.8" rx="0.85" ry="1.3" fill="#ffffff" opacity="0.6" transform="rotate(-20 19.4 24.8)"/>
  </g>
</svg>
