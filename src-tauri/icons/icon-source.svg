<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NamAsta Diagnostics">
  <defs>
    <!-- maroon body gradient (1024 space) -->
    <linearGradient id="bg" x1="160" y1="120" x2="864" y2="904" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9a1a36"/>
      <stop offset="0.5" stop-color="#6a0f22"/>
      <stop offset="1" stop-color="#3c0813"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.26" cy="0.1" r="0.9">
      <stop stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- artwork gradients, authored in the original 48-unit space; they live inside the
         transformed group below, so they scale together with the tube artwork -->
    <linearGradient id="blood" x1="24" y1="24" x2="24" y2="37" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff5a5f"/>
      <stop offset="0.55" stop-color="#ef2b2b"/>
      <stop offset="1" stop-color="#b3091a"/>
    </linearGradient>
    <linearGradient id="drop" x1="24" y1="4" x2="24" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6b70"/>
      <stop offset="1" stop-color="#d61f2b"/>
    </linearGradient>
    <clipPath id="tube">
      <path d="M 16.4,13 L 16.4,30 Q 16.4,36.6 24,36.6 Q 31.6,36.6 31.6,30 L 31.6,13 Z"/>
    </clipPath>
  </defs>

  <!-- macOS-style squircle body: 824x824 centred on 1024 (100px margins), large soft corners -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#gloss)"/>
  <rect x="101.5" y="101.5" width="821" height="821" rx="183.5" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>

  <!-- blood-collection tube + drop, scaled from 48-unit art and centred in the body -->
  <g transform="translate(188,232) scale(13.5)">
    <path d="M 24,4.2 C 25.9,7 27.2,8.6 27.2,10 C 27.2,11.8 25.8,12.9 24,12.9 C 22.2,12.9 20.8,11.8 20.8,10 C 20.8,8.6 22.1,7 24,4.2 Z" fill="url(#drop)"/>
    <g clip-path="url(#tube)">
      <rect x="15" y="24.5" width="18" height="14" fill="url(#blood)"/>
      <ellipse cx="24" cy="24.7" rx="7.6" ry="1.5" fill="#ffd0d2" opacity="0.5"/>
      <circle cx="20.4" cy="30.5" r="1.3" fill="#7d0512" opacity="0.5"/>
      <circle cx="27.1" cy="32.8" r="1.7" fill="#7d0512" opacity="0.45"/>
    </g>
    <path d="M 15,15 L 15,30 Q 15,38 24,38 Q 33,38 33,30 L 33,15" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <ellipse cx="24" cy="15" rx="9" ry="2.1" stroke="#ffffff" stroke-width="2.1" fill="none"/>
    <path d="M 19,18 L 19,29" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
