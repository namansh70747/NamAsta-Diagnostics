<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NamAsta Diagnostics">
  <defs>
    <!-- fresh cyan → blue → indigo tile gradient -->
    <linearGradient id="bg" x1="120" y1="90" x2="900" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.26" cy="0.08" r="0.95">
      <stop stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="specimen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fde047"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#gloss)"/>
  <rect x="49.5" y="49.5" width="925" height="925" rx="206.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>

  <!-- microscope (48-unit art) scaled & centred in the tile -->
  <g transform="translate(168,150) scale(14.4)">
    <!-- ARM: one bold curved limb — the spine of the microscope. Rises from the base, curves
         over the top and carries the eyepiece. Drawn as a thick filled crescent. -->
    <path d="M 23,7.5
             C 32.5,7.5 35.5,15 33.5,23
             L 28.7,23
             C 30,17.5 28.5,12.6 23,12.6 Z" fill="#ffffff"/>
    <!-- optical body tube hanging from the arm, eyepiece cap on top -->
    <rect x="20.4" y="8.2" width="6.4" height="17.2" rx="3.2" fill="#ffffff"/>
    <rect x="19.2" y="6" width="8.8" height="4.6" rx="2.3" fill="#ffffff"/>
    <!-- objective lens nub pointing at the specimen -->
    <rect x="21.4" y="24.2" width="4.4" height="3.4" rx="1.5" fill="#ffffff"/>
    <!-- STAGE platform (specimen sits on top) -->
    <rect x="11.5" y="27.4" width="17" height="3.8" rx="1.9" fill="#ffffff"/>
    <!-- PILLAR from stage to base -->
    <rect x="21.4" y="30" width="5" height="6.4" rx="1.8" fill="#ffffff"/>
    <!-- BASE foot -->
    <path d="M 11,40.4 C 11,37 14.5,35 24,35 C 33.5,35 37,37 37,40.4 C 37,41.7 35.8,42.4 33.4,42.4 L 14.6,42.4 C 12.2,42.4 11,41.7 11,40.4 Z" fill="#ffffff"/>
    <!-- specimen accent drops on the stage, just under the objective -->
    <circle cx="16" cy="25.2" r="2" fill="url(#specimen)"/>
    <circle cx="20" cy="26" r="1.25" fill="url(#specimen)"/>
  </g>
</svg>
