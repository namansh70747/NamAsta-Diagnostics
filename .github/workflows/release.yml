name: Release (Windows)

# Builds the signed Windows installer + auto-update artifacts and publishes a GitHub Release
# whenever a version tag is pushed (e.g. `git tag v1.0.1 && git push origin v1.0.1`).
# The release includes `latest.json`, which installed apps poll to auto-update themselves.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      # Harden cargo's network layer against the intermittent CI failure
      #   "curl failed [16] Error in the HTTP2 framing layer"
      # seen while downloading crates from crates.io on GitHub runners. Disabling
      # HTTP/2 multiplexing forces plain HTTP/1.1 (no framing layer to break), the
      # sparse protocol is more robust than the old git index, and git-CLI fetches
      # fall back cleanly. Also retry a few times before giving up.
      CARGO_HTTP_MULTIPLEXING: 'false'
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_NET_RETRY: '5'
    steps:
      - uses: actions/checkout@v4

      - name: Clear old Rust caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --limit 100 --json id --jq '.[].id' |
            ConvertFrom-Json |
            ForEach-Object { gh cache delete $_ } 2>$null || true
        shell: pwsh
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node dependencies
        run: npm ci

      - name: Build & publish (signed installer + updater artifacts)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The updater private key + password. Set these in the repo's
          # Settings → Secrets and variables → Actions. Without them the build fails,
          # because the app only trusts updates signed by the matching public key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NamAsta Diagnostics ${{ github.ref_name }}'
          releaseBody: |
            ## NamAsta Diagnostics ${{ github.ref_name }}

            **New install:** download the `.exe` setup file below and run it on the lab PC.

            **Existing labs:** you don't need to do anything — the app checks for updates
            automatically. Or open **Settings → System → Check for updates** to install now.
            Your patients, doctors, tests and reports are never affected by an update.

            See the [changelog](https://github.com/namansh70747/scl-lab-app/blob/master/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
